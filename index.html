<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192x192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512x512.png">
<title>РейсТрекер</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--card:#1a1d27;--card2:#222535;--accent:#f5a623;--green:#2ecc71;--red:#e74c3c;--blue:#3498db;--text:#f0f0f0;--muted:#7a7f99;--border:#2e3147;--input-bg:#12141e;--radius:14px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);font-size:15px}

/* ===== AUTH SCREENS ===== */
#authWrap{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
#authWrap.hidden{display:none}
.auth-logo{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;color:var(--accent);margin-bottom:8px}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:40px;text-align:center}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:360px}
.auth-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;color:var(--text);margin-bottom:20px;text-align:center}
.google-btn{width:100%;padding:14px;border-radius:12px;border:1.5px solid var(--border);background:var(--card2);color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:all 0.2s}
.google-btn:hover{border-color:var(--accent);background:#1e2135}
.google-btn:active{transform:scale(0.97)}
.google-icon{width:20px;height:20px;flex-shrink:0}

/* ===== PENDING SCREEN ===== */
#pendingWrap{position:fixed;inset:0;background:var(--bg);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
#pendingWrap.show{display:flex}
.pending-icon{font-size:64px;margin-bottom:20px}
.pending-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--accent);margin-bottom:12px}
.pending-text{font-size:14px;color:var(--muted);line-height:1.6;max-width:300px;margin-bottom:24px}
.pending-user{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;color:var(--text-dim);margin-bottom:24px;max-width:300px;width:100%}
.btn-logout-small{background:transparent;border:1.5px solid var(--border);color:var(--muted);padding:10px 20px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* ===== MAIN APP ===== */
#app{display:flex;flex-direction:column;height:100dvh;display:none}
#app.show{display:flex}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px 10px;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px}
